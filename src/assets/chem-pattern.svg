<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#48b8a0" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#38bdf8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f87171" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Molecular bonds -->
    <g stroke="url(#grad1)" stroke-width="2" opacity="0.6">
      <path d="M80 80 l40 0 l40 40 l0 40 l-40 40 l-40 0 l-40 -40 l0 -40 z"/>
      <path d="M280 120 l40 0 l40 40 l0 40 l-40 40 l-40 0 l-40 -40 l0 -40 z"/>
      <path d="M180 220 l40 0 l40 40 l0 40 l-40 40 l-40 0 l-40 -40 l0 -40 z"/>
    </g>
    <!-- Atomic orbitals -->
    <g stroke="url(#grad2)" stroke-width="1.5" opacity="0.4">
      <circle cx="100" cy="100" r="25"/>
      <circle cx="300" cy="160" r="30"/>
      <circle cx="200" cy="260" r="20"/>
      <circle cx="150" cy="320" r="15"/>
      <circle cx="320" cy="320" r="25"/>
    </g>
    <!-- Electron paths -->
    <g stroke="#48b8a0" stroke-width="1" opacity="0.3">
      <ellipse cx="100" cy="100" rx="35" ry="12" transform="rotate(45 100 100)"/>
      <ellipse cx="300" cy="160" rx="40" ry="15" transform="rotate(-30 300 160)"/>
      <ellipse cx="200" cy="260" rx="28" ry="10" transform="rotate(60 200 260)"/>
    </g>
    <!-- Connecting bonds -->
    <g stroke="#38bdf8" stroke-width="1.5" opacity="0.5">
      <line x1="125" y1="100" x2="270" y2="160"/>
      <line x1="300" y1="190" x2="220" y2="250"/>
      <line x1="180" y1="280" x2="150" y2="305"/>
      <line x1="220" y1="280" x2="295" y2="305"/>
    </g>
    <!-- Small atoms -->
    <g fill="#fbbf24" opacity="0.3">
      <circle cx="50" cy="50" r="3"/>
      <circle cx="350" cy="80" r="2"/>
      <circle cx="250" cy="350" r="4"/>
      <circle cx="120" cy="200" r="2"/>
      <circle cx="380" cy="250" r="3"/>
    </g>
  </g>
</svg>
