<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    
    <!-- Chemical molecule pattern -->
    <pattern id="moleculePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="25" cy="25" r="3" fill="#94a3b8" opacity="0.3"/>
      <circle cx="75" cy="25" r="3" fill="#94a3b8" opacity="0.3"/>
      <circle cx="25" cy="75" r="3" fill="#94a3b8" opacity="0.3"/>
      <circle cx="75" cy="75" r="3" fill="#94a3b8" opacity="0.3"/>
      <line x1="25" y1="25" x2="75" y2="25" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
      <line x1="25" y1="25" x2="25" y2="75" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
      <line x1="75" y1="25" x2="75" y2="75" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
      <line x1="25" y1="75" x2="75" y2="75" stroke="#94a3b8" stroke-width="1" opacity="0.2"/>
    </pattern>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main background -->
  <rect width="800" height="400" fill="url(#bgGradient)"/>
  
  <!-- Molecule pattern overlay -->
  <rect width="800" height="400" fill="url(#moleculePattern)"/>
  
  <!-- Central beaker/flask icon -->
  <g transform="translate(400, 200)">
    <!-- Flask outline -->
    <path d="M -30 -40 L -30 -20 L -40 20 Q -40 40 -20 40 L 20 40 Q 40 40 40 20 L 30 -20 L 30 -40 Z" 
          fill="none" 
          stroke="#64748b" 
          stroke-width="3" 
          opacity="0.8"/>
    
    <!-- Liquid inside flask -->
    <path d="M -35 15 Q -35 35 -15 35 L 15 35 Q 35 35 35 15 L 25 -15 L -25 -15 Z" 
          fill="#3b82f6" 
          opacity="0.3"/>
    
    <!-- Bubbles in liquid -->
    <circle cx="-10" cy="5" r="3" fill="#60a5fa" opacity="0.6"/>
    <circle cx="5" cy="10" r="2" fill="#60a5fa" opacity="0.6"/>
    <circle cx="-5" cy="0" r="2.5" fill="#60a5fa" opacity="0.6"/>
    
    <!-- Flask neck -->
    <rect x="-8" y="-50" width="16" height="15" fill="#64748b" opacity="0.8"/>
    
    <!-- Glow effect on flask -->
    <circle cx="0" cy="-10" r="50" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  </g>
  
  <!-- Decorative atoms/molecules around the edges -->
  <g opacity="0.4">
    <!-- Top left molecule -->
    <g transform="translate(100, 80)">
      <circle cx="0" cy="0" r="8" fill="#ef4444"/>
      <circle cx="15" cy="10" r="6" fill="#3b82f6"/>
      <circle cx="-10" cy="12" r="5" fill="#10b981"/>
      <line x1="0" y1="0" x2="15" y2="10" stroke="#94a3b8" stroke-width="2"/>
      <line x1="0" y1="0" x2="-10" y2="12" stroke="#94a3b8" stroke-width="2"/>
    </g>
    
    <!-- Top right molecule -->
    <g transform="translate(700, 100)">
      <circle cx="0" cy="0" r="7" fill="#8b5cf6"/>
      <circle cx="-12" cy="8" r="5" fill="#f59e0b"/>
      <circle cx="10" cy="6" r="6" fill="#06b6d4"/>
      <line x1="0" y1="0" x2="-12" y2="8" stroke="#94a3b8" stroke-width="2"/>
      <line x1="0" y1="0" x2="10" y2="6" stroke="#94a3b8" stroke-width="2"/>
    </g>
    
    <!-- Bottom left molecule -->
    <g transform="translate(120, 320)">
      <circle cx="0" cy="0" r="6" fill="#10b981"/>
      <circle cx="10" cy="-8" r="5" fill="#ef4444"/>
      <circle cx="-8" cy="-10" r="4" fill="#3b82f6"/>
      <line x1="0" y1="0" x2="10" y2="-8" stroke="#94a3b8" stroke-width="2"/>
      <line x1="0" y1="0" x2="-8" y2="-10" stroke="#94a3b8" stroke-width="2"/>
    </g>
    
    <!-- Bottom right molecule -->
    <g transform="translate(680, 300)">
      <circle cx="0" cy="0" r="7" fill="#f59e0b"/>
      <circle cx="-11" cy="-9" r="5" fill="#8b5cf6"/>
      <circle cx="9" cy="-7" r="6" fill="#06b6d4"/>
      <line x1="0" y1="0" x2="-11" y2="-9" stroke="#94a3b8" stroke-width="2"/>
      <line x1="0" y1="0" x2="9" y2="-7" stroke="#94a3b8" stroke-width="2"/>
    </g>
  </g>
  
  <!-- "Chem Club" text -->
  <text x="400" y="350" font-family="Arial, sans-serif" font-size="24" font-weight="600" text-anchor="middle" fill="#475569" opacity="0.8">
    Chem Club Event
  </text>
  
  <!-- Subtle vignette effect -->
  <rect width="800" height="400" fill="none" stroke="url(#bgGradient)" stroke-width="4" opacity="0.5"/>
</svg>
